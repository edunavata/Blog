name: CI
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  build:
    name: Build (strict) + link check
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.0
      TZ: Europe/Oslo
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo
        run: |
          mkdir -p "${HOME}/.local/hugo"
          curl -fsLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -C "${HOME}/.local/hugo" -xf "hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify Hugo version
        run: hugo version

      - name: Build (strict)
        run: |
          hugo \
            --gc \
            --minify \
            --panicOnWarning \
            -b "https://blog-cmj.pages.dev/"

      - name: Link check (lychee, offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline ./public
          fail: true
