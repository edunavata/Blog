# -- Configuración base del sitio --
theme = "hextra"
baseURL = "https://blog-cmj.pages.dev/"
defaultContentLanguage = "es"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 70

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"

[sitemap]
  changeFreq = "weekly"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.typographer]
        disable = false
  [markup.highlight]
    noClasses = false

[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[caches]
  [caches.images]
    dir = ":cacheDir/images"
