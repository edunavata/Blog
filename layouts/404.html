<!doctype html>
<html lang="es" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Página no encontrada | {{ .Site.Title }}</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        background: #fff;
        color: #111;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #111; color: #f1f5f9; }
        .num { color: #1e293b; }
        .btn-outline { border-color: #334155; color: #94a3b8; }
        .btn-outline:hover { border-color: #64748b; color: #f1f5f9; }
      }
      .num {
        font-size: clamp(5rem, 20vw, 9rem);
        font-weight: 800;
        color: #e2e8f0;
        line-height: 1;
        letter-spacing: -0.05em;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-top: 1rem;
      }
      p {
        color: #64748b;
        margin-top: 0.5rem;
        font-size: 1rem;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 2rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      a {
        display: inline-block;
        padding: 0.625rem 1.5rem;
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        transition: opacity 0.15s;
      }
      a:hover { opacity: 0.85; }
      .btn-primary {
        background: #2563eb;
        color: #fff;
      }
      .btn-outline {
        border: 1px solid #cbd5e1;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="num">404</p>
      <h1>Página no encontrada</h1>
      <p>La página que buscas no existe o ha sido movida.</p>
      <div class="actions">
        <a href="{{ "/" | relURL }}" class="btn-primary">Volver al inicio</a>
        <a href="{{ "/posts/" | relURL }}" class="btn-outline">Ver el blog</a>
      </div>
    </main>
  </body>
</html>
